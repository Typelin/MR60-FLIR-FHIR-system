<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫療熱成像 FHIR 資料庫監控面板</title>
    <!-- 引入 Google Fonts 現代字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 30, 55, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-color: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.35);
            --success-color: #10b981;
            --success-glow: rgba(16, 185, 129, 0.3);
            --danger-color: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.3);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            transition: all 0.25s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            background-image: 
                radial-gradient(circle at 5% 15%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 95% 85%, rgba(16, 185, 129, 0.06) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 750px;
            perspective: 1000px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.45);
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        h1 {
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 12px var(--primary-glow);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 35px;
        }

        button {
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 14px 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, #2563eb 100%);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--primary-glow);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success-color) 0%, #059669 100%);
            box-shadow: 0 4px 15px var(--success-glow);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--success-glow);
        }

        .records-panel {
            border-top: 1px solid var(--border-color);
            padding-top: 30px;
        }

        .records-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .records-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .records-list::-webkit-scrollbar {
            width: 6px;
        }
        .records-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }
        .records-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        .record-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .record-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .patient-name {
            font-size: 1.05rem;
            font-weight: 700;
        }

        .record-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .temp-badge {
            font-size: 1.1rem;
            font-weight: 800;
            padding: 6px 14px;
            border-radius: 10px;
        }

        .temp-normal {
            background: rgba(16, 185, 129, 0.12);
            color: var(--success-color);
            border: 1px solid rgba(16, 185, 129, 0.25);
        }

        .temp-fever {
            background: rgba(239, 68, 68, 0.12);
            color: var(--danger-color);
            border: 1px solid rgba(239, 68, 68, 0.25);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.15);
        }

        .no-records {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
            font-size: 0.95rem;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <header>
            <h1>醫療熱成像資料庫面板</h1>
            <p class="subtitle">PostgreSQL 連線與數據庫資料監控</p>
        </header>

        <!-- 設定配置列 -->
        <div class="config-grid">
            <div class="form-group">
                <label for="apiUrl">後端 API 網址</label>
                <input type="text" id="apiUrl" value="" placeholder="載入中...">
            </div>
            <div class="form-group">
                <label for="patientName">病人姓名</label>
                <input type="text" id="patientName" value="王大明" placeholder="請輸入姓名">
            </div>
        </div>

        <div class="config-grid" style="margin-top: -10px;">
            <div class="form-group" style="grid-column: span 2;">
                <label for="temperatureVal">模擬體溫 (°C)</label>
                <input type="number" id="temperatureVal" value="37.5" step="0.1" min="35.0" max="42.0" placeholder="輸入或使用相機抓取體溫">
            </div>
        </div>

        <!-- 公網分享網址 (直接寫在網頁內展示，避免污染網址列) -->
        <div class="form-group" style="margin-bottom: 25px;">
            <label>本期 Cloudflare 公網分享網址 (外網測試用)</label>
            <input type="text" id="tunnelUrlField" readonly value="{{TUNNEL_URL}}" style="color: #60a5fa; font-weight: bold; border-color: rgba(96, 165, 250, 0.4); background: rgba(96, 165, 250, 0.05);">
        </div>

        <div class="btn-group">
            <button id="getBtn" class="btn-primary" onclick="loadDatabaseRecords()">
                <span id="getSpinner" class="spinner hidden"></span>
                <span>重新整理紀錄 (GET)</span>
            </button>
            <button id="postBtn" class="btn-success" onclick="uploadTemperatureRecord()">
                <span id="postSpinner" class="spinner hidden"></span>
                <span>寫入資料庫 (POST)</span>
            </button>
        </div>

        <div class="records-panel">
            <div class="records-header">
                <h3>PostgreSQL 體溫數據紀錄</h3>
                <span id="dbStatusBadge" style="font-size: 0.8rem; color: var(--success-color);">正在初始化...</span>
            </div>
            
            <div id="recordsList" class="records-list">
                <div class="no-records">正在載入資料庫數據...</div>
            </div>
        </div>
    </div>
</div>

<script>
    // 網頁載入時自動設定 API 網址 (使用相對路徑，免去 DNS 傳播延遲)
    window.onload = function() {
        // 自動使用當前網域 (例如本機 http://localhost:8080/api，外網 https://xxx.trycloudflare.com/api)
        document.getElementById("apiUrl").value = window.location.origin + "/api";
        loadDatabaseRecords();
    };

    function formatUrl(url) {
        let target = url.trim();
        if (!target) return "";
        if (!target.startsWith("http://") && !target.startsWith("https://")) {
            target = "https://" + target;
        }
        return target;
    }

    async function loadDatabaseRecords() {
        const urlInput = document.getElementById("apiUrl").value;
        const targetUrl = formatUrl(urlInput);
        if (!targetUrl) return;

        const getBtn = document.getElementById("getBtn");
        const getSpinner = document.getElementById("getSpinner");
        const recordsList = document.getElementById("recordsList");
        const dbStatusBadge = document.getElementById("dbStatusBadge");

        getBtn.disabled = true;
        getSpinner.classList.remove("hidden");

        try {
            const response = await fetch(targetUrl, { method: "GET" });
            if (response.ok) {
                const result = await response.json();
                dbStatusBadge.innerText = "資料庫連線中";
                dbStatusBadge.style.color = "var(--success-color)";
                renderRecords(result.records);
            } else {
                throw new Error();
            }
        } catch (error) {
            dbStatusBadge.innerText = "連線失敗";
            dbStatusBadge.style.color = "var(--danger-color)";
            recordsList.innerHTML = `<div class="no-records" style="color: var(--danger-color);">無法連線至後端伺服器，請確認伺服器已啟動。</div>`;
        } finally {
            getBtn.disabled = false;
            getSpinner.classList.add("hidden");
        }
    }

    async function uploadTemperatureRecord() {
        const urlInput = document.getElementById("apiUrl").value;
        const patientName = document.getElementById("patientName").value.trim();
        const tempVal = parseFloat(document.getElementById("temperatureVal").value);
        const targetUrl = formatUrl(urlInput);

        if (!targetUrl) return alert("請輸入 API 網址！");
        if (!patientName) return alert("請輸入病人姓名！");
        if (isNaN(tempVal)) return alert("請輸入有效的體溫數值！");

        const postBtn = document.getElementById("postBtn");
        const postSpinner = document.getElementById("postSpinner");

        postBtn.disabled = true;
        postSpinner.classList.remove("hidden");

        try {
            const response = await fetch(targetUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    patient_name: patientName,
                    temperature: tempVal
                })
            });

            if (response.ok) {
                await loadDatabaseRecords();
            } else {
                alert("寫入失敗，請確認後端服務狀態。");
            }
        } catch (error) {
            alert("寫入失敗，無法連線至後端伺服器。");
        } finally {
            postBtn.disabled = false;
            postSpinner.classList.add("hidden");
        }
    }

    function renderRecords(records) {
        const recordsList = document.getElementById("recordsList");
        
        if (!records || records.length === 0) {
            recordsList.innerHTML = `<div class="no-records">目前資料庫中沒有任何紀錄。</div>`;
            return;
        }

        let html = "";
        records.forEach(item => {
            const isFever = item.temperature > 37.5;
            const badgeClass = isFever ? "temp-badge temp-fever" : "temp-badge temp-normal";
            
            html += `
                <div class="record-item">
                    <div class="record-info">
                        <div class="patient-name">${item.patient_name}</div>
                        <div class="record-time">${item.timestamp}</div>
                    </div>
                    <div class="${badgeClass}">${item.temperature.toFixed(1)} °C</div>
                </div>
            `;
        });
        
        recordsList.innerHTML = html;
    }
</script>

</body>
</html>
