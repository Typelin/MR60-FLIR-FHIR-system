<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FHIR IoT 穿牆連線控制面板</title>
    <!-- 引入 Google Fonts 現代字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 30, 55, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-color: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.35);
            --success-color: #10b981;
            --success-glow: rgba(16, 185, 129, 0.3);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 650px;
            perspective: 1000px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: var(--text-muted);
        }

        .input-wrapper {
            position: relative;
            display: flex;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 18px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 14px 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, #2563eb 100%);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--primary-glow);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success-color) 0%, #059669 100%);
            box-shadow: 0 4px 15px var(--success-glow);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--success-glow);
        }

        button:active {
            transform: translateY(1px);
        }

        .result-panel {
            margin-top: 30px;
            border-top: 1px solid var(--border-color);
            padding-top: 25px;
            display: none;
        }

        .result-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-online {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success-color);
            border: 1px solid var(--success-color);
            box-shadow: 0 0 10px var(--success-glow);
        }

        .badge-offline {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        pre {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 18px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #34d399;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <header>
            <h1>FHIR 穿牆連線控制面板</h1>
            <p class="subtitle">Cloudflare Tunnel 後端互動測試</p>
        </header>

        <div class="form-group">
            <label for="apiUrl">後端 API 網址</label>
            <div class="input-wrapper">
                <input type="text" id="apiUrl" value="http://localhost:8080" placeholder="請輸入 trycloudflare.com 網址">
            </div>
        </div>

        <div class="form-group">
            <label for="patientName">模擬病人姓名 (POST 測試)</label>
            <div class="input-wrapper">
                <input type="text" id="patientName" value="王大明" placeholder="請輸入病人姓名進行體溫登錄測試">
            </div>
        </div>

        <div class="btn-group">
            <button id="getBtn" class="btn-primary" onclick="sendGetRequest()">
                <span id="getSpinner" class="spinner hidden"></span>
                <span>測試連線 (GET)</span>
            </button>
            <button id="postBtn" class="btn-success" onclick="sendPostRequest()">
                <span id="postSpinner" class="spinner hidden"></span>
                <span>模擬上傳數據 (POST)</span>
            </button>
        </div>

        <div id="resultPanel" class="result-panel">
            <div class="result-title">
                <h3 id="panelTitle">伺服器回應結果</h3>
                <span id="statusBadge" class="badge">ONLINE</span>
            </div>
            <pre id="jsonResult"></pre>
        </div>
    </div>
</div>

<script>
    // 網頁載入時自動讀取網址 Query Parameter
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const tunnelUrl = urlParams.get('tunnel');
        if (tunnelUrl) {
            document.getElementById("apiUrl").value = tunnelUrl;
            // 自動發送 GET 連線測試
            sendGetRequest();
        }
    };

    function formatUrl(url) {
        let target = url.trim();
        if (!target) return "";
        if (!target.startsWith("http://") && !target.startsWith("https://")) {
            target = "https://" + target;
        }
        return target;
    }

    // 發送 GET 連線測試
    async function sendGetRequest() {
        const urlInput = document.getElementById("apiUrl").value;
        const targetUrl = formatUrl(urlInput);
        if (!targetUrl) return alert("請輸入 API 網址！");

        const getBtn = document.getElementById("getBtn");
        const getSpinner = document.getElementById("getSpinner");
        const resultPanel = document.getElementById("resultPanel");
        const statusBadge = document.getElementById("statusBadge");
        const jsonResult = document.getElementById("jsonResult");
        const panelTitle = document.getElementById("panelTitle");

        getBtn.disabled = true;
        getSpinner.classList.remove("hidden");
        resultPanel.style.display = "none";
        panelTitle.innerText = "GET 測試回應";

        const startTime = Date.now();

        try {
            const response = await fetch(targetUrl, { method: "GET" });
            const latency = Date.now() - startTime;
            
            if (response.ok) {
                const data = await response.json();
                statusBadge.className = "badge badge-online";
                statusBadge.innerText = `ONLINE (${latency}ms)`;
                jsonResult.style.color = "#34d399";
                jsonResult.innerText = JSON.stringify(data, null, 4);
            } else {
                throw new Error(`HTTP 錯誤: ${response.status}`);
            }
        } catch (error) {
            showError(error);
        } finally {
            getBtn.disabled = false;
            getSpinner.classList.add("hidden");
            resultPanel.style.display = "block";
        }
    }

    // 發送 POST 模擬體溫上傳
    async function sendPostRequest() {
        const urlInput = document.getElementById("apiUrl").value;
        const patientName = document.getElementById("patientName").value.trim();
        const targetUrl = formatUrl(urlInput);
        if (!targetUrl) return alert("請輸入 API 網址！");
        if (!patientName) return alert("請輸入模擬病人姓名！");

        const postBtn = document.getElementById("postBtn");
        const postSpinner = document.getElementById("postSpinner");
        const resultPanel = document.getElementById("resultPanel");
        const statusBadge = document.getElementById("statusBadge");
        const jsonResult = document.getElementById("jsonResult");
        const panelTitle = document.getElementById("panelTitle");

        postBtn.disabled = true;
        postSpinner.classList.remove("hidden");
        resultPanel.style.display = "none";
        panelTitle.innerText = "POST 模擬數據回應";

        const startTime = Date.now();

        try {
            const response = await fetch(targetUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ patient_name: patientName })
            });
            const latency = Date.now() - startTime;
            
            if (response.ok) {
                const data = await response.json();
                statusBadge.className = "badge badge-online";
                statusBadge.innerText = `成功寫入 (${latency}ms)`;
                jsonResult.style.color = "#34d399";
                jsonResult.innerText = JSON.stringify(data, null, 4);
            } else {
                throw new Error(`HTTP 錯誤: ${response.status}`);
            }
        } catch (error) {
            showError(error);
        } finally {
            postBtn.disabled = false;
            postSpinner.classList.add("hidden");
            resultPanel.style.display = "block";
        }
    }

    function showError(error) {
        const statusBadge = document.getElementById("statusBadge");
        const jsonResult = document.getElementById("jsonResult");
        statusBadge.className = "badge badge-offline";
        statusBadge.innerText = "OFFLINE";
        jsonResult.style.color = "#ef4444";
        jsonResult.innerText = JSON.stringify({
            "error": "連線失敗",
            "reason": error.message,
            "tip": "請確認後端 Python 伺服器 (server.py) 是否有開著，以及 Cloudflare Tunnel 是否處於啟動狀態。"
        }, null, 4);
    }
</script>

</body>
</html>
